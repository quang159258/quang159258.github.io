<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Toán NEDU - Luyện thi Toán</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <link href="./css.css" rel="stylesheet" />
  </head>
  <body>
    <nav
      id="nav"
      class="navbar navbar-expand-sm bg-light navbar-dark fixed-top p-0 d-flex flex-row justify-content-between"
      style="
        box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px,
          rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
      "
    >
      <div class="position-relative" style="width: 28%; height: 100%">
        <img
          class="d-block position-absolute"
          style="right: 0px"
          src="./icon/favicon.jpg"
          width="60"
        />
      </div>
      <div id="text" class="h-100 d-flex flex-column my-auto">
        <p class="m-0">Trung tâm luyện thi Nedu</p>
        <p class="m-0">
          523/23A Tùng Thiện Vương, Phường 12, Quận 8, TP. Hồ Chí Minh
        </p>
      </div>
    </nav>
    <div
      id="Carousel"
      class="container-fluid"
      style="height: 1000px; padding: 0 0"
    >
      <div class="w-100">
        <div
          id="carouselIntroduction"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#carouselIntroduction"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselIntroduction"
              data-bs-slide-to="1"
              aria-label="Slide 2"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselIntroduction"
              data-bs-slide-to="2"
              aria-label="Slide 3"
            ></button>
          </div>
          <div id="btn">
            <button type="button" class="btn btn-danger btn-lg">
              Đăng ký ngay
            </button>
          </div>
          <div
            class="carousel-inner h-100"
            style="
              box-shadow: rgba(0, 0, 0, 0.16) 0px 3px 6px,
                rgba(0, 0, 0, 0.23) 0px 3px 6px;
            "
          >
            <div class="carousel-item active">
              <img
                src="./z5140154741327_d40fc3aa1ada27e33a0f35a60398b3d4.jpg"
                class="w-100"
                alt="..."
              />
            </div>
            <div class="carousel-item">
              <img
                src="./z5140154741822_db0a87cd565a4a2ab9efbe66e269d100.jpg"
                class="w-100"
                alt="..."
              />
            </div>
            <div class="carousel-item">
              <img
                src="./z5140154743531_a10ce6a9181a85b49901ce4dcf398b76.jpg"
                class="w-100"
                alt="..."
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselIntroduction"
            data-bs-slide="prev"
          >
            <span
              class="carousel-control-prev-icon"
              aria-hidden="true"
              style="border: 2px solid white"
            ></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselIntroduction"
            data-bs-slide="next"
          >
            <span
              class="carousel-control-next-icon"
              aria-hidden="true"
              style="border: 2px solid white"
            ></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
      <div class="w-100" style="height: 300px"></div>
    </div>
    <script>
      {
        var element = document.getElementById("Carousel");
        var nav = document.getElementById("nav");
        element.style.marginTop = nav.offsetHeight + "px";
      }
    </script>
  </body>
</html>
